<!DOCTYPE html>
<html>
  <head>
    <title>Semester Project: Solar System</title>
    <script src="script/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="stars" src="texture/2k_stars_milky_way.jpg">
        <img id="sun" src="texture/2k_sun.jpg">
        <img id="mercury" src="texture/2k_mercury.jpg">
        <img id="venus" src="texture/2k_venus_atmosphere.jpg">
        <img id="earth" src="texture/2k_earth_daymap.jpg">
        <img id="mars" src="texture/2k_mars.jpg">
        <img id="jupiter" src="texture/2k_jupiter.jpg">
        <img id="saturn" src="texture/2k_saturn.jpg">
        <img id="saturn-ring" src="texture/2k_saturn_ring_alpha.png">
        <img id="uranus" src="texture/2k_uranus.jpg">
        <img id="neptune" src="texture/2k_neptune.jpg">
        <img id="moon" src="texture/2k_moon.jpg">
      </a-assets>

      <a-sky src="#stars"></a-sky>

      <!-- Orbital paths -->
      <a-torus position="0 0 0" radius="18" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="24" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="33" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="45" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="66" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="87" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="111" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>
      <a-torus position="0 0 0" radius="132" radius-tubular="0.2" rotation="90 0 0" material="color: #ffffff; transparent: true; opacity: 0.3"></a-torus>

      <a-sphere id="the-sun" position="0 0 0" radius="18" src="#sun" material="shader: flat"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        <a-light type="point" intensity="5" distance="300"></a-light>
      </a-sphere>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
        <a-sphere position="18 0 0" radius="2.0" src="#mercury"></a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <a-sphere position="24 0 0" radius="3.5" src="#venus"></a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
        <a-sphere position="33 0 0" radius="3.8" src="#earth"></a-sphere>
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
          <a-sphere position="33 0 5" radius="1.0" src="#moon"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear">
        <a-sphere position="45 0 0" radius="2.8" src="#mars"></a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 24000; easing: linear">
        <a-sphere position="66 0 0" radius="8.5" src="#jupiter"></a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 32000; easing: linear">
        <a-entity position="87 0 0">
            <a-sphere radius="7.0" src="#saturn"></a-sphere>
            <a-ring src="#saturn-ring" radius-inner="8.0" radius-outer="12.0" rotation="90 0 0" material="side: double; transparent: true"></a-ring>
        </a-entity>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 40000; easing: linear">
        <a-sphere position="111 0 0" radius="5.5" src="#uranus"></a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 50000; easing: linear">
        <a-sphere position="132 0 0" radius="5.5" src="#neptune"></a-sphere>
      </a-entity>

      <a-entity position="0 120 200" rotation="-30 0 0">
        <a-camera wasd-controls="fly: true"></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
